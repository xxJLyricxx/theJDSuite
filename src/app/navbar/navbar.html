<header class="site-header">
  <nav class="nav-shell">
    <a class="brand" routerLink="/" aria-label="Go to home page">
      <span class="brand-mark">JD</span>
      <span class="brand-text">The JD Suite</span>
    </a>

    <div class="nav-links">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        ariaCurrentWhenActive="page"
        aria-label="Go to home page"
      >Home</a>
      <a routerLink="/projects" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        ariaCurrentWhenActive="page"
        aria-label="Go to Projects page"
      >Projects</a>
      <a routerLink="/systems" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        ariaCurrentWhenActive="page"
        aria-label="Go to Systems page"
      >Systems</a>
      <a routerLink="/about" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        ariaCurrentWhenActive="page"
        aria-label="Go to About page"
      >About</a>
    </div>

    <a class="nav-cta" href="#">
      <p>Enter The Lab</p>
    </a>
  </nav>
</header>
