name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href /

      - name: Collect Angular build output
        shell: bash
        run: |
          set -e

          OUTPUT_DIR="$(find dist -type f -name index.html -path "*/browser/index.html" -print -quit | xargs dirname)"

          if [ -z "$OUTPUT_DIR" ]; then
            OUTPUT_DIR="$(find dist -type f -name index.html -print -quit | xargs dirname)"
          fi

          echo "Using build output: $OUTPUT_DIR"

          rm -rf _site
          mkdir _site
          cp -R "$OUTPUT_DIR"/. _site/

          echo "thejdsuite.com" > _site/CNAME
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4